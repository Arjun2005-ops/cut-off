<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rock Paper Scissors Game</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    background: #1e1e2f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .game-container {
    background: #ffffff;
    border-radius: 16px;
    padding: 40px 30px;
    width: 360px;
    max-width: 100%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }

  .hands {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 10px;
  }

  .hands span {
    font-size: 50px;
    display: inline-block;
    animation: shake 1s infinite;
  }

  .hands span:nth-child(2) {
    animation-delay: 0.5s;
  }

  @keyframes shake {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-15deg); }
    75% { transform: rotate(15deg); }
  }

  h1 {
    color: #d6336c;
    font-size: 24px;
    margin: 10px 0 25px;
  }

  .options {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-bottom: 25px;
  }

  .option {
    cursor: pointer;
    background: #f5f5f5;
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 15px 10px;
    width: 80px;
    transition: all 0.2s ease;
  }

  .option:hover {
    border-color: #d6336c;
    transform: translateY(-4px);
    background: #ffeef3;
  }

  .option img, .option .emoji {
    width: 40px;
    height: 40px;
    display: block;
    margin: 0 auto 8px;
    font-size: 40px;
  }

  .option p {
    color: #555;
    font-size: 14px;
    font-weight: 600;
  }

  .selected {
    border-color: #d6336c !important;
    background: #ffeef3 !important;
  }

  .result-area {
    background: #f0f0f5;
    border-radius: 12px;
    padding: 20px;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .choices-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 15px;
  }

  .choice-box {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .choice-box .emoji {
    font-size: 45px;
  }

  .choice-box p {
    font-size: 12px;
    color: #777;
    margin-top: 5px;
  }

  .vs {
    font-weight: bold;
    color: #aaa;
    font-size: 14px;
  }

  .result-text {
    font-size: 18px;
    font-weight: 700;
  }

  .win { color: #2f9e44; }
  .lose { color: #e03131; }
  .draw { color: #f08c00; }

  .placeholder-text {
    color: #999;
    font-size: 15px;
  }

  .score-board {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
    background: #1e1e2f;
    border-radius: 10px;
    padding: 12px 20px;
    color: #fff;
  }

  .score-board div {
    text-align: center;
  }

  .score-board span {
    display: block;
    font-size: 20px;
    font-weight: bold;
    color: #d6336c;
  }

  .reset-btn {
    margin-top: 18px;
    background: #d6336c;
    color: #fff;
    border: none;
    padding: 10px 25px;
    border-radius: 25px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .reset-btn:hover {
    background: #b42a58;
  }
</style>
</head>
<body>

<div class="game-container">
  <div class="hands">
    <span>✊</span>
    <span>✊</span>
  </div>
  <h1>Let's Play!!</h1>

  <div class="options">
    <div class="option" data-choice="rock">
      <div class="emoji">✊</div>
      <p>Rock</p>
    </div>
    <div class="option" data-choice="paper">
      <div class="emoji">✋</div>
      <p>Paper</p>
    </div>
    <div class="option" data-choice="scissors">
      <div class="emoji">✌️</div>
      <p>Scissors</p>
    </div>
  </div>

  <div class="result-area" id="resultArea">
    <p class="placeholder-text">Pick an option to start playing</p>
  </div>

  <div class="score-board">
    <div>You<span id="userScore">0</span></div>
    <div>Draws<span id="drawScore">0</span></div>
    <div>Computer<span id="compScore">0</span></div>
  </div>

  <button class="reset-btn" id="resetBtn">Reset Score</button>
</div>

<script>
  const options = document.querySelectorAll('.option');
  const resultArea = document.getElementById('resultArea');
  const userScoreEl = document.getElementById('userScore');
  const compScoreEl = document.getElementById('compScore');
  const drawScoreEl = document.getElementById('drawScore');
  const resetBtn = document.getElementById('resetBtn');

  const emojis = { rock: '✊', paper: '✋', scissors: '✌️' };
  const choices = ['rock', 'paper', 'scissors'];

  let userScore = 0, compScore = 0, drawScore = 0;

  function getComputerChoice() {
    return choices[Math.floor(Math.random() * 3)];
  }

  function getWinner(user, comp) {
    if (user === comp) return 'draw';
    if (
      (user === 'rock' && comp === 'scissors') ||
      (user === 'paper' && comp === 'rock') ||
      (user === 'scissors' && comp === 'paper')
    ) {
      return 'win';
    }
    return 'lose';
  }

  function playGame(userChoice) {
    const compChoice = getComputerChoice();
    const outcome = getWinner(userChoice, compChoice);

    options.forEach(o => o.classList.remove('selected'));
    document.querySelector(`[data-choice="${userChoice}"]`).classList.add('selected');

    let resultText = '';
    let resultClass = '';

    if (outcome === 'win') {
      userScore++;
      resultText = 'You Win! 🎉';
      resultClass = 'win';
    } else if (outcome === 'lose') {
      compScore++;
      resultText = 'You Lose! 😢';
      resultClass = 'lose';
    } else {
      drawScore++;
      resultText = "It's a Draw! 🤝";
      resultClass = 'draw';
    }

    userScoreEl.textContent = userScore;
    compScoreEl.textContent = compScore;
    drawScoreEl.textContent = drawScore;

    resultArea.innerHTML = `
      <div class="choices-display">
        <div class="choice-box">
          <div class="emoji">${emojis[userChoice]}</div>
          <p>You</p>
        </div>
        <div class="vs">VS</div>
        <div class="choice-box">
          <div class="emoji">${emojis[compChoice]}</div>
          <p>Computer</p>
        </div>
      </div>
      <p class="result-text ${resultClass}">${resultText}</p>
    `;
  }

  options.forEach(option => {
    option.addEventListener('click', () => {
      playGame(option.dataset.choice);
    });
  });

  resetBtn.addEventListener('click', () => {
    userScore = 0;
    compScore = 0;
    drawScore = 0;
    userScoreEl.textContent = 0;
    compScoreEl.textContent = 0;
    drawScoreEl.textContent = 0;
    options.forEach(o => o.classList.remove('selected'));
    resultArea.innerHTML = '<p class="placeholder-text">Pick an option to start playing</p>';
  });
</script>

</body>
</html>
